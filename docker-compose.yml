services:
  spider-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: spider-server:latest
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      HTTP_CONCURRENCY_LIMIT: 1024
      MAX_CONCURRENT_CRAWLS: 8
      DEFAULT_MAX_DEPTH: 2
      MAX_ALLOWED_DEPTH: 6
      DEFAULT_MAX_PAGES: 100
      MAX_ALLOWED_PAGES: 5000
      DEFAULT_CRAWL_CONCURRENCY: 16
      MAX_ALLOWED_CRAWL_CONCURRENCY: 256
      DEFAULT_REQUEST_TIMEOUT_SECS: 10
      MAX_REQUEST_TIMEOUT_SECS: 60
      DEFAULT_CRAWL_TIMEOUT_SECS: 30
      MAX_CRAWL_TIMEOUT_SECS: 300
      REQUEST_BODY_LIMIT_MB: 2
      DEFAULT_CONTENT_CHARS: 4000
      MAX_CONTENT_CHARS: 100000
      # Rotating proxies: put `proxy.txt` in the host directory mounted below (default ./docker-proxy).
      PROXY_FILE: /proxy/proxy.txt
    volumes:
      # Host path is overridable: PROXY_HOST_DIR=/path/to/dir docker compose up
      - ${PROXY_HOST_DIR:-./docker-proxy}:/proxy:ro
    restart: unless-stopped
